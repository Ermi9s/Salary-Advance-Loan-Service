version: "3.9"

services:
  loan-service:
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: loan-service
    env_file:
      - ./.env
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - loan-service-network

  postgres:
    image: postgres:16-alpine
    container_name: loan-service-postgres
    env_file:
      - ./.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - loan-service-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loan_user -d loan_service"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  loan-service-network:
    name: loan-service-network
    driver: bridge
